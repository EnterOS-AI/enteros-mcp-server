name: gitea-merge-queue

# External serialized merge queue for Gitea 1.22.6.
#
# Gitea's `pull_auto_merge` table is not a real merge queue: it does not
# serialize green PRs against a freshly-tested latest main. This workflow runs
# the user-space queue bot, one PR per tick, using the non-bypass merge actor.
#
# Queue contract:
#   - add label `merge-queue` to an open same-repo PR
#   - bot updates stale PR heads with current main, then waits for CI
#   - bot merges only when current main is green and required PR contexts pass
#   - add `merge-queue-hold` to pause a queued PR without removing it

on:
  # `schedule:` removed — the operator conductor tick now runs this queue
  # in-process every 5 min with THIS repo's env + script version preserved
  # (operator-config#194; measurement on operator-config#157: the schedule
  # burned 288 container jobs/day/repo, ~52k/week fleet-wide, ~99% no-ops).
  # workflow_dispatch below remains the manual fallback vehicle.
  # Conductor kill-switch (operator host):
  #   touch /etc/molecule-bootstrap/molecule-ci-conductor-fleet.disabled
  # Full rollback: restore
  #   schedule:
  #     - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gitea-merge-queue-${{ github.repository }}
  cancel-in-progress: false

jobs:
  queue:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out target repo for BP + label context
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Check out molecule-core for queue script
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: molecule-ai/molecule-core
          ref: main
          path: molecule-core

      # KMS migration (RFC: Gitea-Actions-secrets -> Infisical/KMS), proven
      # #971/#3274 pattern: source AUTO_SYNC_TOKEN (the devops-engineer persona
      # PAT / non-bypass merge actor) from the Infisical SSOT via the CI machine
      # identity instead of the duplicated Gitea Actions org secret. Runs in the
      # SAME job as the consumer so the $GITHUB_ENV export is visible below. The
      # Gitea org secret.AUTO_SYNC_TOKEN is RETAINED for now; validate-before-
      # delete happens after this merges and a real run proves the fetch.
      # Infisical is now the AUTHORITATIVE source for this token, so a
      # broken/empty/404 fetch HARD-FAILS here (fail-closed) rather than letting
      # the queue run with an empty merge-actor token.
      #
      # Provenance note (correcting PR description): the PR description
      # describes the migrated set as "low-risk / least-priv". That label
      # applied to MOL_PACKAGE_TOKEN (path /ci/gitea-pypi-publisher, scoped
      # to publish creds) but does NOT apply here — AUTO_SYNC_TOKEN is read
      # from /shared/dev-utils, a SHARED Infisical path that contains
      # other dev-utils secrets alongside it. The binding safety for this
      # token today is the validate-before-delete gate + the fail-closed
      # empty/404 handling below; the dedicated least-priv path for
      # AUTO_SYNC_TOKEN is a followup to land after a green run proves the
      # shared-path fetch end-to-end.
      - name: Fetch AUTO_SYNC_TOKEN from Infisical SSOT
        env:
          INFISICAL_CI_CLIENT_ID: ${{ secrets.INFISICAL_CI_CLIENT_ID }}
          INFISICAL_CI_CLIENT_SECRET: ${{ secrets.INFISICAL_CI_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_CI_PROJECT_ID }}
        run: |
          set -uo pipefail
          BASE="https://key.moleculesai.app"
          TOK=$(curl -fsS -X POST "$BASE/api/v1/auth/universal-auth/login" \
            -H 'Content-Type: application/json' \
            -d "{\"clientId\":\"$INFISICAL_CI_CLIENT_ID\",\"clientSecret\":\"$INFISICAL_CI_CLIENT_SECRET\"}" \
            | python3 -c 'import sys,json;d=json.load(sys.stdin);v=d.get("accessToken");print(v if isinstance(v,str) and v else "")')
          if [ -z "$TOK" ]; then
            echo "Infisical universal-auth login returned no accessToken -- cannot fetch AUTO_SYNC_TOKEN; failing closed" >&2
            exit 1
          fi
          read_secret() {
            curl -fsS "$BASE/api/v3/secrets/raw/$1?workspaceId=$INFISICAL_PROJECT_ID&environment=prod&secretPath=$2" \
              -H "Authorization: Bearer $TOK" \
              | python3 -c 'import sys,json;d=json.load(sys.stdin);v=(d.get("secret") or {}).get("secretValue");print(v if isinstance(v,str) and v else "")'
          }
          # AUTO_SYNC_TOKEN is currently read from /shared/dev-utils (SHARED
          # path, not least-priv). See the Provenance note above for why the
          # earlier "low-risk / least-priv" PR description applied only to
          # MOL_PACKAGE_TOKEN's path. This block will be updated to a
          # dedicated least-priv path in the followup.
          AUTO_SYNC_TOKEN=$(read_secret AUTO_SYNC_TOKEN %2Fshared%2Fdev-utils)
          if [ -z "$AUTO_SYNC_TOKEN" ]; then
            echo "Infisical returned empty for AUTO_SYNC_TOKEN at /shared/dev-utils (prod) -- authoritative fetch failed; failing closed instead of running the queue with an empty merge-actor token" >&2
            exit 1
          fi
          echo "::add-mask::$AUTO_SYNC_TOKEN"
          echo "AUTO_SYNC_TOKEN=$AUTO_SYNC_TOKEN" >> "$GITHUB_ENV"
          echo "AUTO_SYNC_TOKEN loaded from Infisical (non-empty, len=${#AUTO_SYNC_TOKEN})"

      - name: Process one queued PR
        env:
          # AUTO_SYNC_TOKEN is the devops-engineer persona PAT. It is the
          # non-bypass merge actor allowed by branch protection. Now consumed
          # from the process environment ($GITHUB_ENV write above), proven
          # non-empty by the fail-closed Infisical fetch step.
          GITEA_TOKEN: ${{ env.AUTO_SYNC_TOKEN }}
          GITEA_HOST: git.moleculesai.app
          REPO: ${{ github.repository }}
          WATCH_BRANCH: ${{ github.event.repository.default_branch }}
          QUEUE_LABEL: merge-queue
          HOLD_LABEL: merge-queue-hold
          UPDATE_STYLE: merge
          # Recognised official-reviewer set. A merge needs >= required_approvals
          # DISTINCT genuine official approvals from these accounts on the
          # CURRENT head sha (not stale/dismissed). The required_approvals count
          # itself is read from branch protection at runtime.
          REVIEWER_SET: agent-reviewer,agent-researcher,agent-reviewer-cr2
          # NOTE: REQUIRED_CONTEXTS is no longer the authoritative PR gate. The
          # queue now reads the required status contexts from BRANCH PROTECTION
          # (status_check_contexts) so non-required governance reds (qa-review,
          # security-review, sop-tier, sop-checklist when not branch-required,
          # E2E Chat, Staging SaaS, ci-arm64-advisory) cannot block a merge.
          # If branch protection cannot be enumerated the queue HOLDS
          # (fail-closed). REQUIRED_APPROVALS below is only a fallback used when
          # branch protection does not specify required_approvals.
          REQUIRED_APPROVALS: "2"
          # Push-side required contexts. Checking CI / test (push)
          # explicitly instead of the combined state avoids false-pause when
          # non-blocking jobs (continue-on-error: true) have failed — those
          # failures pollute combined state but do not gate merges.
          # NOTE: molecule-mcp-server's CI workflow (.gitea/workflows/ci.yml)
          # has a single job named "test", not "all-required" (that name is
          # specific to molecule-core's aggregated sentinel). The context
          # must match the actual job key or the queue will pause forever.
          PUSH_REQUIRED_CONTEXTS: CI / test (push)
        run: python3 molecule-core/.gitea/scripts/gitea-merge-queue.py
